<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Facu · La Cabrera Miami</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow-x: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0A0806;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* LANDING */
    .landing {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      background: radial-gradient(ellipse at 30% 50%, rgba(165,32,32,0.08) 0%, transparent 60%);
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 10vw, 64px);
      font-weight: 700;
      color: #A52020;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .brand-sub {
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #6B6560;
      margin-bottom: 4px;
    }

    .brand-addr {
      font-size: 11px;
      color: #4A4540;
      letter-spacing: 0.06em;
      margin-bottom: 40px;
    }

    .brand-desc {
      font-size: 15px;
      color: #9E9590;
      max-width: 360px;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .open-btn {
      background: transparent;
      border: 1px solid #A52020;
      color: #A52020;
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 14px 36px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .open-btn:hover { background: #A52020; color: #fff; }

    /* CHAT FULLSCREEN */
    .chat-screen {
      display: none;
      flex-direction: column;
      height: 100%;
      width: 100%;
      max-width: 100vw;
      overflow: hidden;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #141210;
    }

    .chat-screen.open { display: flex; }

    /* HEADER */
    .chat-header {
      background: #1E1A16;
      padding: 14px 18px;
      padding-top: max(14px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2A2420;
      flex-shrink: 0;
    }

    .agent-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #A52020;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      position: relative;
    }

    .agent-avatar::after {
      content: '';
      position: absolute;
      bottom: 1px; right: 1px;
      width: 10px; height: 10px;
      background: #40916C;
      border-radius: 50%;
      border: 2px solid #1E1A16;
    }

    .agent-info { flex: 1; }
    .agent-name { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: #F2E8D9; }
    .agent-status { font-size: 11px; color: #40916C; margin-top: 1px; }

    .close-btn {
      background: none; border: none;
      color: #6B6560; font-size: 20px;
      cursor: pointer; padding: 4px 8px;
      flex-shrink: 0;
    }

    /* MESSAGES */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px;
      width: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #2A2420; border-radius: 2px; }

    .msg {
      max-width: 75%;
      min-width: 0;
      word-break: break-word;
      overflow-wrap: break-word;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .msg.agent {
      background: #1E1A16;
      color: #F2E8D9;
      border: 1px solid #2A2420;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .msg.user {
      background: #A52020;
      color: #ffffff;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }

    /* TYPING */
    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: #1E1A16;
      border: 1px solid #2A2420;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      width: fit-content;
    }

    .typing span {
      width: 7px; height: 7px;
      background: #A52020;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* FOOTER */
    .chat-footer-wrap {
      background: #141210;
      border-top: 1px solid #2A2420;
      flex-shrink: 0;
    }

    .quick-replies {
      padding: 8px 12px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      border-bottom: 1px solid #1E1A16;
      overflow: hidden;
    }

    .quick-btn {
      background: #1E1A16;
      border: 1px solid #2A2420;
      color: #A52020;
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 1;
    }
    .quick-btn:hover { background: #2A2420; }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      width: 100%;
      max-width: 100%;
      overflow: hidden;
    }

    .input-row input {
      flex: 1;
      min-width: 0;
      padding: 10px 14px;
      border: 1px solid #2A2420;
      border-radius: 24px;
      font-size: 15px;
      outline: none;
      background: #1E1A16;
      color: #F2E8D9;
      font-family: 'Inter', sans-serif;
    }

    .input-row input::placeholder { color: #6B6560; }
    .input-row input:focus { border-color: #A52020; }

    .send-btn {
      width: 40px; height: 40px; min-width: 40px;
      border-radius: 50%;
      background: #A52020;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: white;
      font-size: 16px;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #8B1A1A; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .powered {
      text-align: center;
      font-size: 9px;
      color: #2A2420;
      padding: 4px;
      padding-bottom: max(4px, env(safe-area-inset-bottom));
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

<!-- LANDING -->
<div class="landing" id="landing">
  <div class="brand-name">La Cabrera</div>
  <div class="brand-sub">Parrilla Argentina · Miami</div>
  <div class="brand-addr">17100 Collins Ave, Sunny Isles Beach · FL 33160</div>
  <p class="brand-desc">Bienvenido a La Cabrera Miami. Hablá con Facu, nuestro asistente virtual, para reservas, consultas sobre el menú y más.</p>
  <button class="open-btn" onclick="openChat()">Hablar con Facu</button>
</div>

<!-- CHAT -->
<div class="chat-screen" id="chatScreen">
  <div class="chat-header">
    <div class="agent-avatar">F</div>
    <div class="agent-info">
      <div class="agent-name">Facu</div>
      <div class="agent-status">En línea ahora</div>
    </div>
    <button class="close-btn" onclick="closeChat()">✕</button>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="chat-footer-wrap">
    <div class="quick-replies" id="quickReplies">
      <button class="quick-btn" onclick="sendQuick('Ver el menú')">🥩 Menú</button>
      <button class="quick-btn" onclick="sendQuick('Hacer una reserva')">📅 Reservar</button>
      <button class="quick-btn" onclick="sendQuick('¿Cuáles son los horarios?')">🕐 Horarios</button>
      <button class="quick-btn" onclick="sendQuick('¿Cómo llego?')">📍 Ubicación</button>
    </div>
    <div class="input-row">
      <input type="text" id="chatInput" placeholder="Escribí tu consulta..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <div class="powered">Powered by RBS · Roxana Brand Studios</div>
  </div>
</div>

<script>
  let isLoading = false;
  let conversationHistory = [];

  function openChat() {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('chatScreen').classList.add('open');
    if (conversationHistory.length === 0) {
      setTimeout(() => addAgentMessage("¡Bienvenido a La Cabrera Miami! Soy Facu, tu asistente. 🥩\n\n¿En qué te puedo ayudar hoy? Podés consultarme sobre el menú, hacer una reserva, o lo que necesités."), 400);
    }
  }

  function closeChat() {
    document.getElementById('chatScreen').classList.remove('open');
    document.getElementById('landing').style.display = 'flex';
  }

  function addAgentMessage(text) {
    const msgs = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'msg agent';
    div.innerHTML = text.replace(/\n/g, '<br>');
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addUserMessage(text) {
    const msgs = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'msg user';
    div.textContent = text;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const msgs = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  function hideQuickReplies() {
    document.getElementById('quickReplies').style.display = 'none';
  }

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || isLoading) return;

    hideQuickReplies();
    addUserMessage(text);
    input.value = '';
    conversationHistory.push({ role: 'user', content: text });

    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    showTyping();

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory }),
      });

      const data = await response.json();
      hideTyping();

      if (data.response) {
        addAgentMessage(data.response);
        conversationHistory.push({ role: 'assistant', content: data.response });
      } else {
        addAgentMessage('Perdoná, hubo un problema. ¿Podés intentarlo de nuevo?');
      }
    } catch (err) {
      hideTyping();
      addAgentMessage('Perdoná, no pude conectarme. Intentá de nuevo en un momento.');
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }

  function sendQuick(text) {
    document.getElementById('chatInput').value = text;
    sendMessage();
  }
</script>
<script>
document.addEventListener('touchmove', function(e) {
  if (e.touches.length === 1) {
    document.documentElement.scrollLeft = 0;
    document.body.scrollLeft = 0;
  }
}, { passive: true });
</script>
</body>
</html>
