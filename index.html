<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Facu · La Cabrera Miami</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { position: fixed; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: #0A0806; }

    /* LANDING */
    #landing {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      background: radial-gradient(ellipse at 30% 50%, rgba(165,32,32,0.08) 0%, transparent 60%);
    }
    .brand-name { font-family:'Playfair Display',serif; font-size: clamp(36px,10vw,64px); font-weight:700; color:#A52020; letter-spacing:0.06em; margin-bottom:6px; }
    .brand-sub { font-size:12px; letter-spacing:0.2em; text-transform:uppercase; color:#6B6560; margin-bottom:4px; }
    .brand-addr { font-size:11px; color:#4A4540; letter-spacing:0.06em; margin-bottom:36px; }
    .brand-desc { font-size:15px; color:#9E9590; max-width:360px; line-height:1.7; margin-bottom:32px; }
    .open-btn { background:transparent; border:1px solid #A52020; color:#A52020; font-family:'Playfair Display',serif; font-size:14px; letter-spacing:0.12em; text-transform:uppercase; padding:14px 36px; border-radius:4px; cursor:pointer; }
    .open-btn:hover { background:#A52020; color:#fff; }

    /* CHAT */
    #chat {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      flex-direction: column;
      background: #141210;
      overflow: hidden;
    }
    #chat.open { display: flex; }

    /* HEADER */
    .hdr {
      background: #1E1A16;
      border-bottom: 1px solid #2A2420;
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .av {
      width: 40px; height: 40px; border-radius: 50%;
      background: #A52020;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; color: #fff;
      flex-shrink: 0; position: relative;
    }
    .av::after { content:''; position:absolute; bottom:1px; right:1px; width:10px; height:10px; background:#40916C; border-radius:50%; border:2px solid #1E1A16; }
    .hdr-info { flex: 1; min-width: 0; }
    .hdr-name { font-family:'Playfair Display',serif; font-size:16px; font-weight:600; color:#F2E8D9; }
    .hdr-status { font-size:11px; color:#40916C; }
    .hdr-close { background:none; border:none; color:#6B6560; font-size:22px; cursor:pointer; padding:0 4px; flex-shrink:0; }

    /* MESSAGES */
    #msgs {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .row { display: flex; width: 100%; }
    .row.agent { justify-content: flex-start; }
    .row.user { justify-content: flex-end; }
    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .row.agent .bubble { background:#1E1A16; color:#F2E8D9; border:1px solid #2A2420; border-bottom-left-radius:4px; }
    .row.user .bubble { background:#A52020; color:#fff; border-bottom-right-radius:4px; }

    /* TYPING */
    .typing { display:flex; gap:4px; padding:12px 14px; background:#1E1A16; border:1px solid #2A2420; border-radius:16px; border-bottom-left-radius:4px; width:fit-content; }
    .typing span { width:7px; height:7px; background:#A52020; border-radius:50%; animation:bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay:.2s; }
    .typing span:nth-child(3) { animation-delay:.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-6px);opacity:1} }

    /* FOOTER */
    .ftr { flex-shrink: 0; background:#141210; border-top:1px solid #2A2420; padding-bottom: env(safe-area-inset-bottom); }
    .quick { display:flex; gap:6px; padding:8px 12px; overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch; }
    .quick::-webkit-scrollbar { display:none; }
    .qbtn { flex-shrink:0; background:#1E1A16; border:1px solid #2A2420; color:#A52020; font-size:11px; padding:5px 10px; border-radius:20px; cursor:pointer; white-space:nowrap; }
    .inp-row { display:flex; align-items:center; gap:8px; padding:8px 12px; }
    .inp-row input { flex:1; min-width:0; padding:10px 14px; border:1px solid #2A2420; border-radius:24px; font-size:15px; outline:none; background:#1E1A16; color:#F2E8D9; font-family:'Inter',sans-serif; }
    .inp-row input::placeholder { color:#6B6560; }
    .inp-row input:focus { border-color:#A52020; }
    .sbtn { width:40px; height:40px; min-width:40px; flex-shrink:0; border-radius:50%; background:#A52020; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px; }
    .sbtn:disabled { opacity:.4; }
    .powered { text-align:center; font-size:9px; color:#2A2420; padding:4px; }
  </style>
</head>
<body>

<div id="landing">
  <div class="brand-name">La Cabrera</div>
  <div class="brand-sub">Parrilla Argentina · Miami</div>
  <div class="brand-addr">17100 Collins Ave, Sunny Isles Beach · FL 33160</div>
  <p class="brand-desc">Bienvenido a La Cabrera Miami. Hablá con Facu, nuestro asistente virtual, para reservas, consultas sobre el menú y más.</p>
  <button class="open-btn" onclick="openChat()">Hablar con Facu</button>
</div>

<div id="chat">
  <div class="hdr">
    <div class="av">F</div>
    <div class="hdr-info">
      <div class="hdr-name">Facu</div>
      <div class="hdr-status">En línea ahora</div>
    </div>
    <button class="hdr-close" onclick="closeChat()">✕</button>
  </div>

  <div id="msgs"></div>

  <div class="ftr">
    <div class="quick" id="quick">
      <button class="qbtn" onclick="sq('Ver el menú')">🥩 Menú</button>
      <button class="qbtn" onclick="sq('Hacer una reserva')">📅 Reservar</button>
      <button class="qbtn" onclick="sq('¿Cuáles son los horarios?')">🕐 Horarios</button>
      <button class="qbtn" onclick="sq('¿Cómo llego?')">📍 Ubicación</button>
    </div>
    <div class="inp-row">
      <input type="text" id="inp" placeholder="Escribí tu consulta..." onkeydown="if(event.key==='Enter')send()">
      <button class="sbtn" id="sbtn" onclick="send()">➤</button>
    </div>
    <div class="powered">Powered by RBS · Roxana Brand Studios</div>
  </div>
</div>

<script>
  let loading = false;
  let history = [];

  function openChat() {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('chat').classList.add('open');
    if (history.length === 0) {
      setTimeout(() => addMsg('agent', '¡Bienvenido a La Cabrera Miami! Soy Facu, tu asistente. 🥩\n\n¿En qué te puedo ayudar hoy?'), 400);
    }
  }

  function closeChat() {
    document.getElementById('chat').classList.remove('open');
    document.getElementById('landing').style.display = 'flex';
  }

  // MENU POR CATEGORIAS
  const MENU = {
    "🥩 Cortes": `Todos nuestros cortes son Certified Angus Beef:

Short Ribs 28oz — $59 | 18oz — $39
New York Strip 21oz — $56 | 14oz — $42 | 28oz Grand — $74
New York Strip con queso azul 14oz — $42
Outside Skirt 21oz — $62 | 14oz — $43
Ribeye CAB 21oz — $73 | 14oz — $50
Filet Mignon 21oz — $112 | 14oz — $75
Filet Mignon con jamón, queso y huevo 14oz — $82
T-Bone CAB 28oz — $98
Tomahawk CAB 48oz — $168 (ideal para 2-3 personas)
Cowboy Bone-In Rib Eye 28oz — $98
Flap Steak 21oz — $52 | 14oz — $36
Brochette de lomo — $63
Wagyu y Dry Aged — consultanos`,

    "🍖 Entradas": `De la parrilla:
Chorizo — $17
Morcilla — $17
Mollejas a la parrilla — $42
Provoleta argentina — $19
Provoleta especial (tomates secos y jamón crudo) — $22

Del Josper (horno a leña):
Gambas pil-pil (ajo, hongos y aceite de oliva) — $20
Gambas a la parrilla (ajo y perejil) — $18

De la cocina:
Empanadas de choclo, carne o veggie x4 — $23 | x2 — $12
Burrata sobre tartar de tomate y palta — $23`,

    "🍝 Pastas": `Ravioles de hongos y trufa con tomates mantecados — $25
Ravioles de ricota y espinaca con salsa de tomate y crema — $24
Ñoquis soufflé con salsa Triplo Burro — $24
Ñoquis soufflé con crema de tres quesos — $23
Penne Rigate con pesto cremoso — $19
Spaghetti con salsa de mariscos — $29`,

    "🥗 Ensaladas": `César de pollo con panceta — $25
Rúcula y parmesano — $18
Palta, palmito y tomate — $19
Peras y queso de cabra con rúcula, frutos secos y miel — $18
Tataki de atún con mix de verdes, tomate, frutos secos y brie — $25
Mixta (mix de verdes, tomate, palta y cebolla) — $17`,

    "🍟 Guarniciones": `Brócoli al vapor — $8
Macarrones con queso — $8
Papas fritas — $8
Papas fritas con cebolla caramelizada — $10
Papas fritas con huevo revuelto — $10
Papas fritas con queso azul — $10
Puré de calabaza — $8
Puré de papas — $8
Puré mixto — $8
Verduras a la parrilla — $10`,

    "🍮 Postres": `Flan casero especial — $13
Crepas de dulce de leche — $13
Torta de galletitas y dulce de leche — $13
Crème brûlée — $13
Port Salut con membrillo y batata — $14
Cheesecake de dulce de leche — $15
Volcán de chocolate con helado — $15
Degustación de 5 postres — $36
Degustación de helados — $29
Bocha de helado — $8`,

    "🐟 Pescados": `Del Josper (horno a leña):
Salmón a la parrilla — $38
Atún a la parrilla con verduras — $36
Pescado del día — consultanos
Pulpo a la parrilla con verduras (1/2) — $38`,

    "🍗 Pollo y milanesas": `Pechuga con queso ahumado — $24
Pechuga con manteca de hierbas — $24
Pollo a la parrilla — $22
Milanesa de Outside Skirt — $40
Milanesa napolitana de Outside Skirt — $46
Milanesa napolitana de New York Strip — $40
Milanesa napolitana de pollo — $24`
  };

  function renderMenuSection(cat, texto) {
    const msgs = document.getElementById('msgs');
    const row = document.createElement('div');
    row.className = 'row agent';

    const card = document.createElement('div');
    card.style.cssText = 'background:#1E1A16;border:1px solid #2A2420;border-radius:12px;overflow:hidden;max-width:90%;min-width:260px;';

    // Foto
    // Header
    const header = document.createElement('div');
    header.style.cssText = 'background:#A52020;padding:10px 14px;font-family:Playfair Display,serif;font-size:14px;font-weight:600;color:#fff;';
    header.textContent = cat;
    card.appendChild(header);

    // Parsear líneas
    const lineas = texto.trim().split('\n');
    let seccionActual = null;

    lineas.forEach(linea => {
      linea = linea.trim();
      if (!linea) return;

      // Es un subtítulo (no tiene precio)
      if (!linea.includes('—') && !linea.includes('$') && linea.endsWith(':')) {
        const sub = document.createElement('div');
        sub.style.cssText = 'padding:8px 14px 4px;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:#A52020;border-top:1px solid #2A2420;margin-top:4px;';
        sub.textContent = linea.replace(':', '');
        card.appendChild(sub);
        return;
      }

      // Es un plato con precio
      if (linea.includes('$') || linea.includes('—')) {
        const partes = linea.split('—');
        const nombre = partes[0].trim();
        const precio = partes[1] ? partes[1].trim() : '';

        const item = document.createElement('div');
        item.style.cssText = 'display:flex;justify-content:space-between;align-items:baseline;padding:8px 14px;border-bottom:1px solid rgba(42,36,32,0.5);gap:8px;';

        const n = document.createElement('span');
        n.style.cssText = 'font-size:13px;color:#F2E8D9;flex:1;';
        n.textContent = nombre;

        const p = document.createElement('span');
        p.style.cssText = 'font-size:13px;color:#A52020;font-weight:600;white-space:nowrap;flex-shrink:0;';
        p.textContent = precio;

        item.appendChild(n);
        item.appendChild(p);
        card.appendChild(item);
        return;
      }

      // Texto normal
      const txt = document.createElement('div');
      txt.style.cssText = 'padding:6px 14px;font-size:12px;color:#9E9590;';
      txt.textContent = linea;
      card.appendChild(txt);
    });

    row.appendChild(card);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function mostrarMenuCategorias() {
    const msgs = document.getElementById('msgs');
    const row = document.createElement('div');
    row.className = 'row agent';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '¿Qué sección del menú querés ver?';
    row.appendChild(bubble);
    msgs.appendChild(row);

    const brow = document.createElement('div');
    brow.className = 'row agent';
    const btns = document.createElement('div');
    btns.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;padding:4px 0;max-width:90%;';
    Object.keys(MENU).forEach(cat => {
      const btn = document.createElement('button');
      btn.textContent = cat;
      btn.style.cssText = 'background:#1E1A16;border:1px solid #A52020;color:#F2E8D9;font-size:12px;padding:7px 12px;border-radius:20px;cursor:pointer;flex-shrink:0;';
      btn.onclick = () => {
        addMsg('user', cat);
        renderMenuSection(cat, MENU[cat]);
      };
      btns.appendChild(btn);
    });
    brow.appendChild(btns);
    msgs.appendChild(brow);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function linkify(text) {
    return text
      .replace(/\n/g, '<br>')
      .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:#E8B866;text-decoration:underline;word-break:break-all;">$1</a>');
  }

  function addMsg(role, text) {
    const msgs = document.getElementById('msgs');
    const row = document.createElement('div');
    row.className = 'row ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = linkify(text);
    row.appendChild(bubble);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const msgs = document.getElementById('msgs');
    const row = document.createElement('div');
    row.className = 'row agent';
    row.id = 'typing';
    row.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function send() {
    const inp = document.getElementById('inp');
    const text = inp.value.trim();
    if (!text || loading) return;
    document.getElementById('quick').style.display = 'none';
    addMsg('user', text);
    inp.value = '';
    history.push({ role: 'user', content: text });
    loading = true;
    document.getElementById('sbtn').disabled = true;
    showTyping();
    // Detectar si piden el menú
    const menuKeywords = ['menú', 'menu', 'carta', 'platos', 'qué tienen', 'que tienen', 'ver menú', 'ver menu', 'ver el menú'];
    const esMenuRequest = menuKeywords.some(k => text.toLowerCase().includes(k));

    if (esMenuRequest) {
      hideTyping();
      mostrarMenuCategorias();
      history.push({ role: 'assistant', content: '¿Qué sección del menú querés ver?' });
      loading = false;
      document.getElementById('sbtn').disabled = false;
      return;
    }

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      hideTyping();
      const reply = data.response || 'Perdoná, hubo un problema. ¿Podés intentarlo de nuevo?';
      history.push({ role: 'assistant', content: reply });
      addMsg('agent', reply);
    } catch(e) {
      hideTyping();
      addMsg('agent', 'Perdoná, no pude conectarme. Intentá de nuevo en un momento.');
    }
    loading = false;
    document.getElementById('sbtn').disabled = false;
  }

  function sq(text) {
    document.getElementById('inp').value = text;
    send();
  }
</script>
<script>
var startX, startY;
document.addEventListener('touchstart', function(e) {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchmove', function(e) {
  var dx = Math.abs(e.touches[0].clientX - startX);
  var dy = Math.abs(e.touches[0].clientY - startY);
  if (dx > dy) {
    e.preventDefault();
  }
}, { passive: false });
</script>
</body>
</html>
