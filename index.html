<script>
  let loading = false;
  let history = [];

  // Fix teclado iPhone
  const chat = document.getElementById('chat');
  const ftr = document.querySelector('.ftr');
  
  window.addEventListener('resize', () => {
    if (document.getElementById('chat').classList.contains('open')) {
      const vh = window.innerHeight;
      chat.style.height = vh + 'px';
    }
  });

  document.getElementById('inp').addEventListener('focus', () => {
    setTimeout(() => {
      const vh = window.innerHeight;
      chat.style.height = vh + 'px';
      document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
    }, 300);
  });

  document.getElementById('inp').addEventListener('blur', () => {
    setTimeout(() => {
      chat.style.height = '100%';
    }, 100);
  });

  function openChat() {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('chat').classList.add('open');
    chat.style.height = window.innerHeight + 'px';
    if (history.length === 0) {
      setTimeout(() => addMsg('agent', '¡Bienvenido a La Cabrera Miami! Soy Facu, tu asistente. 🥩\n\n¿En qué te puedo ayudar hoy?'), 400);
    }
  }

  function closeChat() {
    document.getElementById('chat').classList.remove('open');
    document.getElementById('landing').style.display = 'flex';
  }

  function addMsg(role, text) {
    const msgs = document.getElementById('msgs');
    const row = document.createElement('div');
    row.className = 'row ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = text.replace(/\n/g, '<br>');
    row.appendChild(bubble);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const msgs = document.getElementById('msgs');
    const row = document.createElement('div');
    row.className = 'row agent';
    row.id = 'typing';
    row.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function send() {
    const inp = document.getElementById('inp');
    const text = inp.value.trim();
    if (!text || loading) return;
    document.getElementById('quick').style.display = 'none';
    addMsg('user', text);
    inp.value = '';
    history.push({ role: 'user', content: text });
    loading = true;
    document.getElementById('sbtn').disabled = true;
    showTyping();
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      hideTyping();
      const reply = data.content?.[0]?.text || data.response || 'Perdoná, hubo un problema.';
      history.push({ role: 'assistant', content: reply });
      addMsg('agent', reply);
    } catch(e) {
      hideTyping();
      addMsg('agent', 'Perdoná, no pude conectarme. Intentá de nuevo.');
    }
    loading = false;
    document.getElementById('sbtn').disabled = false;
  }

  function sq(text) {
    document.getElementById('inp').value = text;
    send();
  }
</script>
